<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Studio - 多筆劃繪製器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        #map { height: 600px; width: 100%; border-radius: 12px; z-index: 1; }
        .cursor-draw { cursor: crosshair !important; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="gradient-bg text-white py-6 px-4 shadow-lg mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fas fa-layer-group"></i> GPX Studio (多筆劃版)
                </h1>
                <p class="mt-1 opacity-80 text-xs">支援多次提筆繪製，可分開導出每一筆路徑</p>
            </div>
            <div id="statusBadge" class="bg-white/20 px-4 py-1 rounded-full text-xs font-bold border border-white/30 transition-all">
                模式：瀏覽地圖
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex gap-3">
                <button id="moveBtn" onclick="setMode('move')" class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md transition-all">
                    <i class="fas fa-arrows-alt"></i> 1. 移動地圖
                </button>
                <button id="drawBtn" onclick="setMode('draw')" class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-all">
                    <i class="fas fa-paint-brush"></i> 2. 開始繪圖 (可多次提筆)
                </button>
                <button onclick="undoLastStroke()" class="px-4 py-2.5 text-orange-500 hover:bg-orange-50 rounded-lg transition-colors text-sm">
                    <i class="fas fa-undo"></i> 撤銷一筆
                </button>
                <button onclick="clearAll()" class="px-4 py-2.5 text-gray-400 hover:text-red-500 rounded-lg transition-colors text-sm">
                    <i class="fas fa-trash"></i> 全部清空
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-md p-2 border border-gray-100">
                <div id="map"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-semibold text-gray-700 flex items-center gap-2">
                        <i class="fas fa-stream text-indigo-500"></i> 繪製狀態
                    </h3>
                    <span id="strokeCounter" class="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs font-bold">0 筆劃</span>
                </div>
                
                <div id="strokeList" class="space-y-2 h-80 overflow-y-auto mb-4 text-xs">
                    <p class="text-gray-400 italic">尚未繪製任何路徑...</p>
                </div>

                <div class="space-y-3">
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">導出方式</p>
                    <button onclick="downloadAllStrokes(true)" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 text-sm">
                        <i class="fas fa-file-archive"></i> 分開下載所有檔案
                    </button>
                    <button onclick="downloadAllStrokes(false)" 
                        class="w-full bg-white border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 text-sm">
                        <i class="fas fa-object-group"></i> 合併為單一檔案
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        var map = L.map('map').setView([25.0336, 121.5648], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var allStrokes = []; // 儲存所有筆劃 [[[lat,lng],...], [[lat,lng],...]]
        var currentStrokePoints = [];
        var currentPolyline = null;
        var mapPolylines = []; // 地圖上的線段實例
        var isDrawing = false;
        var mode = 'move';

        function setMode(newMode) {
            mode = newMode;
            const badge = document.getElementById('statusBadge');
            const moveBtn = document.getElementById('moveBtn');
            const drawBtn = document.getElementById('drawBtn');
            
            if (mode === 'draw') {
                badge.innerText = "模式：繪圖中 (按住繪製)";
                badge.classList.replace('bg-white/20', 'bg-red-500');
                drawBtn.className = "flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md transition-all";
                moveBtn.className = "flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-all";
                map.dragging.disable();
                document.getElementById('map').classList.add('cursor-draw');
            } else {
                badge.innerText = "模式：瀏覽地圖";
                badge.classList.replace('bg-red-500', 'bg-white/20');
                moveBtn.className = "flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md transition-all";
                drawBtn.className = "flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-all";
                map.dragging.enable();
                document.getElementById('map').classList.remove('cursor-draw');
            }
        }

        map.on('mousedown', function(e) {
            if (mode !== 'draw') return;
            isDrawing = true;
            currentStrokePoints = [];
            currentPolyline = L.polyline([], {color: '#6366f1', weight: 4}).addTo(map);
        });

        map.on('mousemove', function(e) {
            if (!isDrawing) return;
            const lat = e.latlng.lat.toFixed(6);
            const lng = e.latlng.lng.toFixed(6);
            currentStrokePoints.push([lat, lng]);
            currentPolyline.addLatLng(e.latlng);
        });

        window.addEventListener('mouseup', function() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentStrokePoints.length > 1) {
                allStrokes.push(currentStrokePoints);
                mapPolylines.push(currentPolyline);
                updateUI();
            } else {
                map.removeLayer(currentPolyline);
            }
        });

        function updateUI() {
            const list = document.getElementById('strokeList');
            const counter = document.getElementById('strokeCounter');
            counter.innerText = `${allStrokes.length} 筆劃`;
            
            if (allStrokes.length === 0) {
                list.innerHTML = '<p class="text-gray-400 italic">尚未繪製任何路徑...</p>';
                return;
            }

            list.innerHTML = allStrokes.map((s, i) => `
                <div class="flex items-center justify-between p-2 bg-gray-50 rounded border border-gray-100">
                    <span>第 ${i+1} 筆 (${s.length} 點)</span>
                    <i class="fas fa-check text-green-500"></i>
                </div>
            `).join('');
        }

        function undoLastStroke() {
            if (allStrokes.length === 0) return;
            allStrokes.pop();
            map.removeLayer(mapPolylines.pop());
            updateUI();
        }

        function clearAll() {
            if (!confirm("確定清空所有筆劃？")) return;
            allStrokes = [];
            mapPolylines.forEach(p => map.removeLayer(p));
            mapPolylines = [];
            updateUI();
        }

        function downloadAllStrokes(separate = true) {
            if (allStrokes.length === 0) return alert("請先繪製路徑！");
            const now = new Date().toISOString();

            if (separate) {
                // 分開下載：利用延遲觸發多個下載
                allStrokes.forEach((stroke, i) => {
                    setTimeout(() => {
                        let gpx = createGPXHeader();
                        gpx += `  <trk><name>Stroke_${i+1}</name><trkseg>\n`;
                        stroke.forEach(p => gpx += `    <trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`);
                        gpx += `  </trkseg></trk>\n</gpx>`;
                        triggerDownload(gpx, `Stroke_${i+1}.gpx`);
                    }, i * 500);
                });
            } else {
                // 合併下載
                let gpx = createGPXHeader();
                allStrokes.forEach((stroke, i) => {
                    gpx += `  <trk><name>Stroke_${i+1}</name><trkseg>\n`;
                    stroke.forEach(p => gpx += `    <trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`);
                    gpx += `  </trkseg></trk>\n`;
                });
                gpx += `</gpx>`;
                triggerDownload(gpx, `Full_Drawing.gpx`);
            }
        }

        function createGPXHeader() {
            return `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX_Studio" xmlns="http://www.topografix.com/GPX/1/1">\n`;
        }

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
