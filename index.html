<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Studio - 距離感應繪製器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        #map { height: 600px; width: 100%; border-radius: 12px; z-index: 1; }
        .cursor-draw { cursor: crosshair !important; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="gradient-bg text-white py-6 px-4 shadow-lg mb-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold flex items-center gap-3">
                    <i class="fas fa-ruler-combined"></i> GPX Studio (距離感應版)
                </h1>
                <p class="mt-1 opacity-80 text-xs">即時計算繪製長度，精準掌握路徑規模</p>
            </div>
            <div class="text-right">
                <div class="text-xs opacity-70">總累積距離</div>
                <div id="totalDist" class="text-2xl font-mono font-bold">0 m</div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
        
        <div class="lg:col-span-3 space-y-4">
            <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex gap-3 items-center">
                <button id="moveBtn" onclick="setMode('move')" class="flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md transition-all">
                    <i class="fas fa-arrows-alt"></i> 1. 移動地圖
                </button>
                <button id="drawBtn" onclick="setMode('draw')" class="flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition-all">
                    <i class="fas fa-paint-brush"></i> 2. 開始繪圖
                </button>
                <div class="h-8 w-px bg-gray-200 mx-2"></div>
                <button onclick="undoLastStroke()" class="text-orange-500 hover:bg-orange-50 px-3 py-2 rounded-lg text-sm font-bold">
                    <i class="fas fa-undo"></i> 撤銷
                </button>
                <button onclick="clearAll()" class="text-red-500 hover:bg-red-50 px-3 py-2 rounded-lg text-sm font-bold">
                    <i class="fas fa-trash"></i> 清空
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-md p-2 border border-gray-100">
                <div id="map"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-semibold text-gray-700 flex items-center gap-2">
                        <i class="fas fa-layer-group text-indigo-500"></i> 筆劃清單
                    </h3>
                    <span id="strokeCounter" class="text-xs font-bold text-indigo-600">0 筆</span>
                </div>
                
                <div id="strokeList" class="space-y-2 h-[420px] overflow-y-auto mb-6">
                    <p class="text-gray-400 text-xs italic text-center mt-10">請開始在地圖上繪製...</p>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <button onclick="downloadAllStrokes(true)" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 mb-3 text-sm">
                        <i class="fas fa-file-export"></i> 分開下載 (.gpx)
                    </button>
                    <button onclick="downloadAllStrokes(false)" 
                        class="w-full border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 font-bold py-3 rounded-xl transition-all text-sm">
                        合併下載單一檔案
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        var map = L.map('map').setView([25.0336, 121.5648], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.control.scale({ imperial: false, metric: true }).addTo(map); // 加入比例尺

        var allStrokes = []; // [{points: [], distance: 0}, ...]
        var currentStrokePoints = [];
        var currentPolyline = null;
        var mapPolylines = [];
        var isDrawing = false;
        var mode = 'move';

        function setMode(newMode) {
            mode = newMode;
            if (mode === 'draw') {
                map.dragging.disable();
                document.getElementById('map').classList.add('cursor-draw');
                document.getElementById('drawBtn').className = "flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md";
                document.getElementById('moveBtn').className = "flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200";
            } else {
                map.dragging.enable();
                document.getElementById('map').classList.remove('cursor-draw');
                document.getElementById('moveBtn').className = "flex-1 py-2.5 rounded-lg bg-indigo-600 text-white font-bold shadow-md";
                document.getElementById('drawBtn').className = "flex-1 py-2.5 rounded-lg bg-gray-100 text-gray-600 font-bold hover:bg-gray-200";
            }
        }

        map.on('mousedown', function(e) {
            if (mode !== 'draw') return;
            isDrawing = true;
            currentStrokePoints = [];
            currentPolyline = L.polyline([], {color: '#6366f1', weight: 4}).addTo(map);
        });

        map.on('mousemove', function(e) {
            if (!isDrawing) return;
            const lastPoint = currentStrokePoints[currentStrokePoints.length - 1];
            const newLatLng = e.latlng;
            
            currentStrokePoints.push([newLatLng.lat.toFixed(6), newLatLng.lng.toFixed(6)]);
            currentPolyline.addLatLng(newLatLng);
        });

        window.addEventListener('mouseup', function() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentStrokePoints.length > 1) {
                const dist = calculateDistance(currentStrokePoints);
                allStrokes.push({ points: currentStrokePoints, distance: dist });
                mapPolylines.push(currentPolyline);
                updateUI();
            } else {
                map.removeLayer(currentPolyline);
            }
        });

        // 計算經緯度陣列的距離 (單位: 公尺)
        function calculateDistance(points) {
            let total = 0;
            for (let i = 0; i < points.length - 1; i++) {
                const p1 = L.latLng(points[i][0], points[i][1]);
                const p2 = L.latLng(points[i+1][0], points[i+1][1]);
                total += p1.distanceTo(p2);
            }
            return total;
        }

        function formatDist(m) {
            return m > 1000 ? (m / 1000).toFixed(2) + " km" : Math.round(m) + " m";
        }

        function updateUI() {
            const list = document.getElementById('strokeList');
            const counter = document.getElementById('strokeCounter');
            const totalDisplay = document.getElementById('totalDist');
            
            let total = 0;
            list.innerHTML = '';
            
            allStrokes.forEach((stroke, i) => {
                total += stroke.distance;
                list.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-100 shadow-sm">
                        <div>
                            <div class="text-[10px] font-bold text-indigo-500 uppercase">Stroke ${i+1}</div>
                            <div class="text-sm font-mono font-bold text-gray-700">${formatDist(stroke.distance)}</div>
                        </div>
                        <i class="fas fa-check-circle text-green-400"></i>
                    </div>
                `;
            });

            totalDisplay.innerText = formatDist(total);
            counter.innerText = `${allStrokes.length} 筆`;
            if(allStrokes.length === 0) list.innerHTML = '<p class="text-gray-400 text-xs italic text-center mt-10">請開始在地圖上繪製...</p>';
        }

        function undoLastStroke() {
            if (allStrokes.length === 0) return;
            allStrokes.pop();
            map.removeLayer(mapPolylines.pop());
            updateUI();
        }

        function clearAll() {
            if (!confirm("確定清空？")) return;
            allStrokes = [];
            mapPolylines.forEach(p => map.removeLayer(p));
            mapPolylines = [];
            updateUI();
        }

        function downloadAllStrokes(separate) {
            if (allStrokes.length === 0) return;
            const header = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX_Studio" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            
            if (separate) {
                allStrokes.forEach((s, i) => {
                    setTimeout(() => {
                        let content = header + `  <trk><name>Stroke_${i+1}</name><trkseg>\n` + 
                            s.points.map(p => `    <trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`).join('\n') + 
                            `\n  </trkseg></trk>\n</gpx>`;
                        saveFile(content, `Stroke_${i+1}.gpx`);
                    }, i * 300);
                });
            } else {
                let content = header + allStrokes.map((s, i) => 
                    `  <trk><name>Stroke_${i+1}</name><trkseg>\n` + 
                    s.points.map(p => `    <trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`).join('\n') + 
                    `\n  </trkseg></trk>`
                ).join('\n') + `\n</gpx>`;
                saveFile(content, `Full_Path.gpx`);
            }
        }

        function saveFile(content, name) {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
