<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPX Studio - 地圖手繪轉座標</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        #map { height: 500px; width: 100%; border-radius: 12px; cursor: crosshair; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div class="gradient-bg text-white py-8 px-4 shadow-lg mb-8">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-3xl font-bold flex items-center gap-3">
                <i class="fas fa-edit"></i> GPX 手繪畫板
            </h1>
            <p class="mt-2 opacity-80 text-sm">在地圖上畫出「風火輪」或任何形狀，自動轉換為 GPX 座標</p>
        </div>
    </div>

    <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-4">
            <div class="bg-white rounded-xl shadow-md p-4 border border-gray-100">
                <div id="map"></div>
                <p class="text-xs text-gray-500 mt-2 italic">* 按住滑鼠左鍵不放即可在地圖上繪製路徑</p>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                <h3 class="font-semibold text-gray-700 mb-4 flex items-center gap-2">
                    <i class="fas fa-terminal text-indigo-500"></i> 擷取的座標
                </h3>
                
                <textarea id="inputData" 
                    class="w-full h-64 p-3 border border-gray-200 rounded-lg outline-none font-mono text-xs bg-gray-50 mb-4"
                    placeholder="地圖繪製後此處會自動產生座標..."></textarea>

                <div class="space-y-4">
                    <button onclick="clearMap()" class="w-full py-2 border border-red-500 text-red-500 rounded-lg hover:bg-red-50 transition-colors">
                        <i class="fas fa-trash-alt"></i> 清除重畫
                    </button>
                    
                    <hr>
                    
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">輸出設定</p>
                    <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="format" value="trk" checked>
                        <span class="ml-3 text-sm font-bold text-gray-700 text-sm">🛰️ 一般軌跡 (trk)</span>
                    </label>
                    <label class="flex items-center p-3 border border-gray-100 rounded-lg cursor-pointer hover:bg-indigo-50">
                        <input type="radio" name="format" value="wpt">
                        <span class="ml-3 text-sm font-bold text-gray-700 text-sm">🚩 飛妹專用 (wpt)</span>
                    </label>

                    <button onclick="generateGPX()" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-download"></i> 匯出 GPX
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 初始化地圖 (預設在台北，你可以手動移到任何地方)
        var map = L.map('map').setView([25.0336, 121.5648], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var pathArray = [];
        var polyline = L.polyline([], {color: '#4f46e5', weight: 5}).addTo(map);
        var isDrawing = false;

        // 監聽繪圖事件
        map.on('mousedown', function() {
            isDrawing = true;
            map.dragging.disable(); // 畫圖時禁用拖動地圖
        });

        map.on('mousemove', function(e) {
            if (isDrawing) {
                const lat = e.latlng.lat.toFixed(6);
                const lng = e.latlng.lng.toFixed(6);
                
                // 增加點位
                pathArray.push([lat, lng]);
                polyline.addLatLng(e.latlng);
                
                // 即時更新文字框
                document.getElementById('inputData').value = pathArray.map(p => p.join(', ')).join('\n');
            }
        });

        window.addEventListener('mouseup', function() {
            isDrawing = false;
            map.dragging.enable();
        });

        function clearMap() {
            pathArray = [];
            polyline.setLatLngs([]);
            document.getElementById('inputData').value = '';
        }

        function generateGPX() {
            const rawData = document.getElementById('inputData').value.trim();
            if (!rawData) return alert("請先在地圖上繪製形狀！");

            let lines = rawData.split('\n').map(line => line.split(', '));
            const format = document.querySelector('input[name="format"]:checked').value;
            const now = new Date().toISOString();
            
            let gpxContent = `<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="GPX_Studio" xmlns="http://www.topografix.com/GPX/1/1">\n`;
            
            if (format === 'wpt') {
                lines.forEach((p, i) => {
                    gpxContent += `\t<wpt lat="${p[0]}" lon="${p[1]}"><time>${now}</time><name>PT-${i+1}</name></wpt>\n`;
                });
            } else {
                gpxContent += `\t<trk><name>Drawing</name><trkseg>\n`;
                lines.forEach(p => {
                    gpxContent += `\t\t\t<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>\n`;
                });
                gpxContent += `\t\t</trkseg></trk>\n`;
            }
            gpxContent += `</gpx>`;

            const blob = new Blob([gpxContent], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Drawing_${new Date().getTime()}.gpx`;
            a.click();
        }
    </script>
</body>
</html>
